global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: campusops-api
    metrics_path: /api/metrics
    scrape_timeout: 10s
    params:
      format: [prometheus]
    static_configs:
      - targets:
          - 172.22.187.107:5001

  - job_name: node-exporter
    static_configs:
      - targets:
          - 172.22.187.107:9100
