version: '3.9'

# ═══════════════════════════════════════════════════════
# CampusOps — Docker Compose Stack
# Run: docker-compose up --build
# ═══════════════════════════════════════════════════════

services:

  # ── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: campusops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - campusops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

  # ── React Frontend ───────────────────────────────────
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: campusops-web
    environment:
      - REACT_APP_API_URL=http://api:5000
    depends_on:
      - api
    networks:
      - campusops-net
    restart: unless-stopped

  # ── Node.js API ──────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: campusops-api
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/campusops
      - JWT_SECRET=${JWT_SECRET:-campusops_jwt_secret_change_in_prod}
      - USE_MOCK_DATA=false
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - campusops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MongoDB ──────────────────────────────────────────
  db:
    image: mongo:7.0
    container_name: campusops-db
    environment:
      - MONGO_INITDB_DATABASE=campusops
    volumes:
      - mongo_data:/data/db
    networks:
      - campusops-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mongo_data:
    driver: local

networks:
  campusops-net:
    driver: bridge
